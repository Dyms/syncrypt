name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Specification-only for now; wiring lands with M1 (see ROADMAP.md).
      - name: Install
        run: npm ci || echo "no lockfile yet (spec phase)"
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
